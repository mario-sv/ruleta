<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Jubiladora Arcana - Admin Mode</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url("fondo.jpg");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* 📂 MENÚ LATERAL */
.sidebar {
    position: fixed;
    left: -220px; /* Escondido */
    top: 0;
    width: 200px;
    height: 100%;
    background: rgba(10, 25, 20, 0.95);
    border-right: 2px solid #00ffae;
    transition: 0.3s;
    z-index: 1000;
    padding: 20px;
    text-align: left;
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
}

.sidebar:hover {
    left: 0; /* Se muestra al pasar el mouse */
}

.sidebar h3 {
    color: #00ffae;
    font-size: 18px;
    margin-bottom: 20px;
    border-bottom: 1px solid #00ffae;
    padding-bottom: 10px;
}

.sidebar-label {
    display: block;
    margin-bottom: 10px;
    font-size: 14px;
}

/* 🏰 MAQUINA PRINCIPAL */
.machine {
    display: inline-block;
    padding: 30px;
    border: 3px solid rgba(0,255,180,0.6);
    border-radius: 30px;
    background: rgba(15, 30, 25, 0.9);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,255,180,0.4);
    margin-top: 50px;
}

.screen {
    background: #050505;
    padding: 25px;
    border-radius: 40px;
    border: 1px solid #222;
}

.reels { display: flex; justify-content: center; gap: 15px; }

.reel {
    width: 80px;
    height: 240px;
    overflow: hidden;
    border-radius: 15px;
    background: #000;
    border: 2px solid #00ffae;
    position: relative;
}

.reel::before, .reel::after {
    content: "";
    position: absolute;
    left: 0; width: 100%; height: 2px;
    background: rgba(0,255,174,0.3);
    z-index: 10;
}
.reel::before { top: 80px; }
.reel::after  { top: 160px; }

.reel-inner { position: absolute; width: 100%; }

.symbol {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 55px;
}

/* BOTONES */
button {
    margin-top: 25px;
    font-size: 22px;
    padding: 15px 40px;
    background: linear-gradient(45deg, #00ffae, #008f61);
    color: black;
    font-weight: bold;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,255,174,0.3);
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(0,255,174,0.5);
}

.admin-btn {
    width: 100%;
    font-size: 14px;
    padding: 8px;
    margin-top: 15px;
}

.win { animation: flash 0.4s alternate infinite; }
@keyframes flash {
    from { box-shadow: 0 0 10px white; }
    to { box-shadow: 0 0 50px #00ffae; }
}

.fly-img {
    position: fixed;
    top: 30%; left: -30%;
    width: 500px;
    z-index: 2000;
    animation: fly 3s linear forwards;
    pointer-events: none;
}
@keyframes fly {
    from { transform: translateX(0); }
    to { transform: translateX(160vw); }
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>⚙️ Configuración</h3>
    <label class="sidebar-label">Probabilidad: <span id="probVal">15</span>%</label>
    <input type="range" id="adminSlider" min="0" max="100" value="15" style="width: 100%;">
    <button class="admin-btn" onclick="aplicarCambio()">Guardar Cambios</button>
    <p style="font-size: 10px; margin-top: 20px; color: #666;">Pasa el mouse para ocultar</p>
</div>

<div class="machine" id="machine">
    <h1>La Jubiladora Arcana</h1>
    <div class="screen">
        <div class="reels">
            <div class="reel"><div class="reel-inner" id="reel1"></div></div>
            <div class="reel"><div class="reel-inner" id="reel2"></div></div>
            <div class="reel"><div class="reel-inner" id="reel3"></div></div>
        </div>
    </div>
    <button onclick="tirar()">INVOCAR</button>
</div>

<script>
const simbolos = ["💎","🧪","🔮","⚡","🌿"];
let girando = false;
let probabilidadReal = 0.15; // 15% por defecto

const slider = document.getElementById("adminSlider");
const probVal = document.getElementById("probVal");

// Actualiza el texto visual del slider
slider.oninput = function() {
    probVal.innerHTML = this.value;
}

function aplicarCambio() {
    const pass = prompt("Introduce la contraseña de administrador:");
    
    if (pass === "admin") {
        probabilidadReal = parseInt(slider.value) / 100;
        alert("Configuración actualizada: " + (probabilidadReal * 100) + "% de victoria.");
    } else {
        alert("Contraseña incorrecta. No se han guardado los cambios.");
        slider.value = probabilidadReal * 100; // Resetear slider
        probVal.innerHTML = slider.value;
    }
}

function crearRodillo(id) {
    let cont = document.getElementById(id);
    cont.innerHTML = "";
    for (let i = 0; i < 30; i++) {
        let div = document.createElement("div");
        div.className = "symbol";
        div.textContent = simbolos[Math.floor(Math.random()*simbolos.length)];
        cont.appendChild(div);
    }
}

function animarRodillo(reel, stopTime, finalSymbol, callback) {
    let pos = 0;
    let velocidad = 25;
    let start = performance.now();

    function frame(now) {
        let elapsed = now - start;
        pos += velocidad;
        velocidad *= 0.985;
        reel.style.transform = `translateY(-${pos}px)`;

        if (elapsed < stopTime) {
            requestAnimationFrame(frame);
        } else {
            let finalIndex = 10;
            reel.style.transition = "transform 0.5s ease-out";
            reel.style.transform = `translateY(-${finalIndex * 80}px)`;
            reel.children[finalIndex + 1].textContent = finalSymbol;
            callback();
        }
    }
    requestAnimationFrame(frame);
}

function showFly(imgSrc) {
    let img = document.createElement("img");
    img.src = imgSrc;
    img.className = "fly-img";
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 3200);
}

function tirar() {
    if (girando) return;
    girando = true;

    crearRodillo("reel1");
    crearRodillo("reel2");
    crearRodillo("reel3");

    let reels = [document.getElementById("reel1"), document.getElementById("reel2"), document.getElementById("reel3")];
    let gana = Math.random() < probabilidadReal;

    let resultado = gana 
        ? ["💎","💎","💎"] 
        : [simbolos[Math.floor(Math.random()*simbolos.length)], 
           simbolos[Math.floor(Math.random()*simbolos.length)], 
           simbolos[Math.floor(Math.random()*simbolos.length)]];

    reels.forEach((reel, i) => {
        animarRodillo(reel, 1500 + i * 500, resultado[i], () => {
            if (i === 2) finalizar(gana);
        });
    });
}

function finalizar(gana) {
    if (gana) {
        document.getElementById("machine").classList.add("win");
        showFly("victoria.png");
        setTimeout(() => {
            alert("✨ ¡Has encontrado el camino de baldosas amarillas! ✨");
            document.getElementById("machine").classList.remove("win");
        }, 1000);
    } else {
        showFly("derrota.png");
    }
    girando = false;
}

// Carga inicial
window.onload = () => {
    crearRodillo("reel1");
    crearRodillo("reel2");
    crearRodillo("reel3");
};
</script>

</body>
</html>
